<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#211b40">
  <meta name="description" content="完成星火小遊戲，領取指定課程優惠券。">
  <title>星火計畫｜星火收集挑戰</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./game.css?v=spark-game-v1">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <i></i><i></i><i></i><i></i><i></i><i></i>
  </div>

  <main class="game-shell">
    <header class="game-header panel">
      <div>
        <p class="eyebrow">FIRESTAR MINI GAME</p>
        <h1>星火收集挑戰</h1>
        <p>在倒數結束前收集星火，完成後即可領取指定課程優惠券。</p>
      </div>
      <a class="back-link" href="./index.html">返回排課中心</a>
    </header>

    <section class="course-panel panel" aria-labelledby="courseTitle">
      <div>
        <p class="eyebrow">REWARD COURSE</p>
        <h2 id="courseTitle">選擇優惠課程</h2>
      </div>
      <label>
        課程
        <select id="courseSelect" aria-label="選擇優惠券適用課程"></select>
      </label>
      <div id="courseDetail" class="course-detail"></div>
    </section>

    <section class="game-panel panel">
      <div class="stats" aria-live="polite">
        <div><small>已收集</small><strong><span id="score">0</span>/<span id="goal">12</span></strong></div>
        <div><small>剩餘時間</small><strong><span id="time">20.0</span> 秒</strong></div>
        <div><small>完成獎勵</small><strong>100 點券</strong></div>
      </div>

      <div id="playfield" class="playfield" aria-label="星火遊戲區">
        <div id="startOverlay" class="overlay-card">
          <div class="fire-icon" aria-hidden="true">🔥</div>
          <h2>準備好了嗎？</h2>
          <p>點擊遊戲區內出現的星火，20 秒內收集 12 個即可過關。</p>
          <button id="startButton" class="primary-btn" type="button">開始挑戰</button>
        </div>
      </div>

      <p class="mobile-tip">手機請直接點擊星火；電腦可使用滑鼠。</p>
    </section>

    <section id="resultPanel" class="result-panel panel" hidden aria-live="assertive">
      <div id="resultIcon" class="result-icon" aria-hidden="true">🎉</div>
      <p class="eyebrow">CHALLENGE RESULT</p>
      <h2 id="resultTitle">挑戰完成</h2>
      <p id="resultMessage"></p>
      <div class="result-actions">
        <button id="retryButton" class="secondary-btn" type="button">再玩一次</button>
        <a id="claimLink" class="primary-btn" href="./index.html">回排課中心使用優惠券</a>
      </div>
    </section>
  </main>

  <script src="./game.js?v=spark-game-v1" defer></script>
</body>
</html>
